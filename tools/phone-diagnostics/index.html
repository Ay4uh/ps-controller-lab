<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Diagnostics | ay5uh</title>
  <meta name="description" content="Free browser-based phone diagnostics for iPhone and Android. Test your display, touch, audio, sensors, and more.">
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-31VR9YJW06"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-31VR9YJW06');
  </script>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/shared/styles.css?v=4">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>

  <div class="app-layout">
    <main class="main-content">
      <div class="container pb-5">
        <a href="/" class="hero-cta" style="background:transparent; border:1px solid var(--border); color:var(--text-primary); padding:6px 12px; margin:24px 0; display:inline-block;">&larr; Back to all tools</a>

        <div class="dashboard-header mb-4">
          <div class="header-left">
            <h1 class="page-title"><i class="fa-solid fa-mobile-screen-button text-accent"></i> Phone Diagnostics</h1>
            <p class="page-subtitle">Test your iPhone or Android hardware directly in the browser.</p>
            <div id="deviceInfoBanner" class="device-info-banner">
              Detecting device...
            </div>
          </div>
          <div class="header-right">
            <div class="health-score-card">
              <div class="health-score-circle" id="healthScoreCircle">
                <span id="healthScoreValue">--</span>
              </div>
              <div class="health-score-label">Health Score</div>
            </div>
            <button class="btn btn-primary btn-run-all" id="btnRunAll">
              <i class="fa-solid fa-play"></i> Run All Tests
            </button>
          </div>
        </div>

        <div class="diagnostics-grid" id="testsContainer">
          <!-- Modules injected by app.js -->
        </div>

      </div>
    </main>
  </div>

  <!-- Fullscreen Overlays for Tests (e.g. Display Test, Camera Test) -->
  <div id="testOverlay" class="test-overlay hidden">
    <div class="overlay-header">
      <h2 id="overlayTitle">Test Running</h2>
      <button id="btnCancelTest" class="btn btn-danger btn-sm"><i class="fa-solid fa-xmark"></i> Close</button>
    </div>
    <div id="overlayContent" class="overlay-content"></div>
  </div>

  <script src="/shared/sidebar.js?v=5"></script>
  <script src="app.js?v=2"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('phone-diagnostics');
    });
  </script>
</body>
</html>
