<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Benchmark | TechTest</title>
  <meta name="description" content="Free browser-based hardware diagnostics.">
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-31VR9YJW06"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-31VR9YJW06');
  </script>

  <link rel="stylesheet" href="/shared/styles.css?v=17">
  <style>
    .placeholder-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 32px;
      max-width: 500px;
      margin: 48px auto;
      text-align: center;
    }
    .placeholder-title {
      font-size: 24px;
      margin: 0 0 16px 0;
      color: var(--text-primary);
    }
    .placeholder-desc {
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0 0 32px 0;
    }
    .live-tools-list {
      text-align: left;
      background: var(--bg-base);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .live-tools-list a {
      display: block;
      color: var(--text-primary);
      text-decoration: none;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .live-tools-list a:last-child {
      border-bottom: none;
    }
    .live-tools-list a:hover {
      color: var(--accent-blue);
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <main class="main-content">
      <div class="container">
        <a href="/" class="hero-cta" style="background:transparent; border:1px solid var(--border); color:var(--text-primary); padding:6px 12px; margin-top:24px; display:inline-block;">&larr; Back to all tools</a>

        <div class="placeholder-card">
          <h1 class="placeholder-title">⚡ System Benchmark</h1>
          
          <div class="placeholder-desc">
            🔨 This tool is being built.
          </div>

          <div class="live-tools-list">
            <p style="margin:0 0 12px 0; color:var(--text-muted); font-size:12px; text-transform:uppercase; font-weight:700;">Check back soon or try:</p>
            <a href="/tools/controller-lab/">→ Controller Lab (live now)</a>
            <a href="/tools/keyboard-test/">→ Keyboard Test (live now)</a>
            <a href="/tools/battery-tester/">→ Battery Health (live now)</a>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script src="/shared/sidebar.js?v=17"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('benchmark');
    });
  </script>
</body>
</html>
