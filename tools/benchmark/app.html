<style>
  .benchmark-hero {
    background: linear-gradient(135deg, var(--bg-card) 0%, rgba(234, 179, 8, 0.1) 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    margin-bottom: 2rem;
    position: relative;
    overflow: hidden;
  }
  
  .benchmark-hero .score {
    font-size: 5rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 0.5rem;
    color: #eab308;
    text-shadow: 0 0 20px rgba(234, 179, 8, 0.4);
  }

  .run-btn-container {
    padding: 2rem;
    text-align: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 2rem;
  }

  .progress {
    height: 10px;
    background: var(--border);
    border-radius: 5px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.2s;
  }

  .log-panel {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 200px;
    overflow-y: auto;
    padding: 1rem;
    font-family: monospace;
    font-size: 0.85rem;
    text-align: left;
  }
  
  .log-line { margin-bottom: 0.25rem; color: var(--text-muted); }
  .log-line.highlight { color: var(--text); }
</style>

<div class="container-fluid">
  
  <div class="mb-4">
    <h1 class="fw-bold mb-2"><i class="fa-solid fa-bolt" style="color:var(--text-muted);"></i> System Benchmark</h1>
    <p class="text-muted">Run an intensive combined CPU, RAM, and browser rendering benchmark to calculate your ay5uh System Score.</p>
  </div>

  <div class="benchmark-hero">
    <div class="score" id="finalScore">--</div>
    <div class="fw-bold text-muted text-uppercase tracking-wider">ay5uh Performance Score</div>
    <div class="small mt-2" style="color:var(--text-muted); opacity: 0.7;">Compare with your friends or run again after cleaning your laptop</div>
  </div>

  <div class="run-btn-container" id="runContainer">
    <button class="btn-custom-primary btn-lg px-5 py-3 mb-4" style="font-size: 1.2rem;" onclick="startBenchmark()" id="startBtn">
      <i class="fa-solid fa-rocket me-2"></i> Start Full Benchmark
    </button>
    
    <div class="progress d-none" id="progContainer">
      <div class="progress-bar" id="progBar"></div>
    </div>
    
    <div class="log-panel" id="logPanel">
      <div class="log-line">Ready to benchmark.</div>
    </div>
  </div>

  <h4 class="fw-bold mt-5 mb-3 border-bottom border-secondary pb-2">Top Recommended Upgrades</h4>
  <div class="row" id="repairOptionsContainer"></div>

</div>

<script>
  trackToolEvent('benchmark_test', 'viewed');

  const repairCosts = JSON.parse(document.getElementById('repairCosts').textContent);
  const repairContainer = document.getElementById('repairOptionsContainer');
  
  // Show random mix of top upgrades
  repairContainer.innerHTML = 
    '<div class="col-md-4">' + createRepairCard(repairCosts.thermal.paste_basic, true) + '</div>' +
    '<div class="col-md-4">' + createRepairCard(repairCosts.ram.upgrade_16gb, false) + '</div>' +
    '<div class="col-md-4">' + createRepairCard(repairCosts.storage.ssd_1tb, false) + '</div>';

  const logger = document.getElementById('logPanel');
  function log(msg, highlight=false) {
    const el = document.createElement('div');
    el.className = 'log-line' + (highlight ? ' highlight' : '');
    el.innerText = `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}`;
    logger.appendChild(el);
    logger.scrollTop = logger.scrollHeight;
  }

  async function startBenchmark() {
    trackToolEvent('benchmark_test', 'started');
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('progContainer').classList.remove('d-none');
    document.getElementById('finalScore').innerText = 'Testing...';
    logger.innerHTML = '';
    
    const pb = document.getElementById('progBar');
    let score = 0;

    log("Starting CPU floating point test...", true);
    pb.style.width = '10%';
    await wait(100);
    const cpu1 = runCPU(10000000);
    score += (10000 / cpu1);
    log(`CPU Test 1 completed in ${Math.round(cpu1)}ms`);

    log("Starting CPU matrix multiplication test...", true);
    pb.style.width = '30%';
    await wait(100);
    const cpu2 = runCPU(15000000);
    score += (15000 / cpu2);
    log(`CPU Test 2 completed in ${Math.round(cpu2)}ms`);

    log("Starting RAM allocation test...", true);
    pb.style.width = '60%';
    await wait(100);
    const ramTime = runRAM();
    score += (5000 / ramTime);
    log(`RAM Test completed in ${Math.round(ramTime)}ms`);

    log("Analyzing hardware concurrency...", true);
    pb.style.width = '80%';
    await wait(500);
    const threads = navigator.hardwareConcurrency || 4;
    score *= (1 + (threads * 0.05));
    log(`Detected ${threads} logical cores`);

    pb.style.width = '100%';
    log("Finalizing score...", true);
    await wait(500);
    
    const finalScore = Math.round(score * 10);
    document.getElementById('finalScore').innerText = finalScore.toLocaleString();
    
    log(`Benchmark complete. Final Score: ${finalScore.toLocaleString()}`, true);
    trackToolEvent('benchmark_test', 'completed', { score: finalScore });

    document.getElementById('startBtn').style.display = 'inline-block';
    document.getElementById('startBtn').innerHTML = '<i class="fa-solid fa-rotate-right me-2"></i> Run Again';
  }

  function runCPU(iterations) {
    const start = performance.now();
    let val = 0;
    for(let i=0; i<iterations; i++) {
      val += Math.sqrt(i * Math.random());
    }
    return performance.now() - start;
  }

  function runRAM() {
    const start = performance.now();
    const arr = [];
    for(let i=0; i<10000; i++) {
      arr.push(new Float64Array(1000));
    }
    // write
    for(let i=0; i<10000; i++) {
      arr[i][500] = 1;
    }
    return performance.now() - start;
  }

  function wait(ms) {
    return new Promise(r => setTimeout(r, ms));
  }
</script>
