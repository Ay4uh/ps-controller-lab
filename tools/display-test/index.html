<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Test — Refresh Rate & Resolution | TechTest</title>
  <meta name="description" content="Free online monitor test. Accurately measure your monitor's true refresh rate (Hz), resolution, and color profile.">
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-31VR9YJW06"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-31VR9YJW06');
  </script>

  <link rel="stylesheet" href="/shared/styles.css?v=16">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .hero-box {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 32px;
      text-align: center;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .hz-display {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      color: var(--accent-blue);
    }
    .hz-label {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .status-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .status-item .label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .status-item .val {
      font-family: var(--font-mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* Ufo Animation to visually show Hz */
    .ufo-track {
      background: var(--bg-hover);
      height: 40px;
      border-radius: 20px;
      margin: 32px auto 0;
      max-width: 800px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .ufo {
      width: 30px;
      height: 30px;
      background: var(--accent-blue);
      border-radius: 50%;
      position: absolute;
      top: 4px;
      left: 0;
      box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="container pb-5">
        <a href="/" class="hero-cta" style="background:transparent; border:1px solid var(--border); color:var(--text-primary); padding:6px 12px; margin:24px 0; display:inline-block;">&larr; Back to all tools</a>

        <div class="mb-4">
          <div style="font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; background: var(--bg-hover); padding: 4px 10px; border-radius: 12px; display: inline-block; margin-bottom: 12px; border: 1px solid var(--border);">LAPTOP / MACBOOK</div>
          <h1 class="fw-bold mb-2"><i class="fa-solid fa-desktop text-accent" style="margin-right: 8px;"></i> Display Test</h1>
          <p class="text-muted">Check refresh rate and basic color rendering.</p>
          <hr style="border-color: var(--border); margin-top: 24px;">
        </div>

        <div class="hero-box">
          <div class="hz-display" id="hzDisplay">--</div>
          <div class="hz-label">Hz Detected</div>
          <div style="color:var(--text-muted); margin-top:8px; font-size:13px;">Based on hardware requestAnimationFrame timing</div>
          
          <div class="ufo-track">
            <div class="ufo" id="ufoBox"></div>
          </div>
          <div style="font-size:12px; color:var(--text-muted); margin-top:8px;">Smoothness Visualizer (600px/sec)</div>
        </div>

        <div class="status-grid">
          <div class="status-item">
            <div class="label">Native Resolution</div>
            <div class="val" id="valRes">--</div>
          </div>
          <div class="status-item">
            <div class="label">Device Pixel Ratio</div>
            <div class="val" id="valDpr">--</div>
          </div>
          <div class="status-item">
            <div class="label">Color Gamut</div>
            <div class="val" id="valColor" style="color:var(--accent-green);">--</div>
          </div>
          <div class="status-item">
            <div class="label">Color Depth</div>
            <div class="val" id="valDepth">--</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/shared/sidebar.js?v=16"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('display-test');
    });

    // Display Specs
    const w = window.screen.width;
    const h = window.screen.height;
    const dpr = window.devicePixelRatio || 1;
    
    document.getElementById('valRes').innerText = `${w * dpr} x ${h * dpr}`;
    document.getElementById('valDpr').innerText = `${dpr}x ${dpr > 1 ? '(HiDPI/Retina)' : ''}`;
    document.getElementById('valDepth').innerText = `${window.screen.colorDepth}-bit`;
    
    // Color Gamut detection (approximate via CSS media queries)
    let gamut = "Standard (sRGB)";
    if (window.matchMedia("(color-gamut: p3)").matches) {
      gamut = "Wide (Display P3)";
    } else if (window.matchMedia("(color-gamut: rec2020)").matches) {
      gamut = "Ultra Wide (Rec.2020)";
    }
    document.getElementById('valColor').innerText = gamut;

    // Hz Detection via requestAnimationFrame
    let frameCount = 0;
    let lastTime = performance.now();
    let lastUfoTime = performance.now();
    let fpsHistory = [];
    const display = document.getElementById('hzDisplay');
    
    // UFO Visualizer
    let ufoPos = 0;
    const ufo = document.getElementById('ufoBox');

    function measureRefresh(time) {
      frameCount++;
      
      // UFO Logic: move 600px per second independent of framerate
      const dt = time - lastUfoTime;
      lastUfoTime = time;
      ufoPos += (600 * (dt / 1000));
      if (ufoPos > 800) ufoPos = -30;
      ufo.style.transform = `translateX(${ufoPos}px)`;

      // FPS Calculation (every ~0.5 seconds)
      if (time - lastTime >= 500) {
        const fps = Math.round((frameCount * 1000) / (time - lastTime));
        fpsHistory.push(fps);
        if (fpsHistory.length > 5) fpsHistory.shift();
        
        // Use max to filter out minor browser stutter drops, cap at common Hz
        let maxFps = Math.max(...fpsHistory);
        
        // Snap to common refresh rates to avoid "59Hz" or "143Hz"
        const common = [30, 60, 75, 90, 120, 144, 165, 240, 360];
        let snapped = common.reduce((prev, curr) => 
          Math.abs(curr - maxFps) <= 3 ? curr : prev
        , maxFps);
        
        display.innerText = snapped;
        
        frameCount = 0;
        lastTime = time;
      }
      
      requestAnimationFrame(measureRefresh);
    }
    
    requestAnimationFrame(measureRefresh);
  </script>
</body>
</html>
