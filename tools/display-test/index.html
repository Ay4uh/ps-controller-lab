  <script src="/shared/sidebar.js?v=24"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('display-test');
    });

    // Display Specs
    const w = window.screen.width;
    const h = window.screen.height;
    const dpr = window.devicePixelRatio || 1;
    
    document.getElementById('valRes').innerText = `${w * dpr} x ${h * dpr}`;
    document.getElementById('valDpr').innerText = `${dpr}x ${dpr > 1 ? '(HiDPI/Retina)' : ''}`;
    document.getElementById('valDepth').innerText = `${window.screen.colorDepth}-bit`;
    
    // Color Gamut detection (approximate via CSS media queries)
    let gamut = "Standard (sRGB)";
    if (window.matchMedia("(color-gamut: p3)").matches) {
      gamut = "Wide (Display P3)";
    } else if (window.matchMedia("(color-gamut: rec2020)").matches) {
      gamut = "Ultra Wide (Rec.2020)";
    }
    document.getElementById('valColor').innerText = gamut;

    // Hz Detection via requestAnimationFrame
    let frameCount = 0;
    let lastTime = performance.now();
    let lastUfoTime = performance.now();
    let fpsHistory = [];
    const display = document.getElementById('hzDisplay');
    
    // UFO Visualizer
    let ufoPos = 0;
    const ufo = document.getElementById('ufoBox');

    function measureRefresh(time) {
      frameCount++;
      
      // UFO Logic: move 600px per second independent of framerate
      const dt = time - lastUfoTime;
      lastUfoTime = time;
      ufoPos += (600 * (dt / 1000));
      if (ufoPos > 800) ufoPos = -30;
      ufo.style.transform = `translateX(${ufoPos}px)`;

      // FPS Calculation (every ~0.5 seconds)
      if (time - lastTime >= 500) {
        const fps = Math.round((frameCount * 1000) / (time - lastTime));
        fpsHistory.push(fps);
        if (fpsHistory.length > 5) fpsHistory.shift();
        
        // Use max to filter out minor browser stutter drops, cap at common Hz
        let maxFps = Math.max(...fpsHistory);
        
        // Snap to common refresh rates to avoid "59Hz" or "143Hz"
        const common = [30, 60, 75, 90, 120, 144, 165, 240, 360];
        let snapped = common.reduce((prev, curr) => 
          Math.abs(curr - maxFps) <= 3 ? curr : prev
        , maxFps);
        
        display.innerText = snapped;
        
        frameCount = 0;
        lastTime = time;
      }
      
      requestAnimationFrame(measureRefresh);
    }
    
    requestAnimationFrame(measureRefresh);
  </script>
