<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mic Test — Check Microphone Quality | ay5uh</title>
  <meta name="description" content="Free online microphone test. Check your mic input level, view the live audio waveform, and measure background noise floor.">
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-31VR9YJW06"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-31VR9YJW06');
  </script>

  <link rel="stylesheet" href="/shared/styles.css?v=9">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .visualizer-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      height: 300px;
      position: relative;
      margin-bottom: 24px;
      overflow: hidden;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .mic-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      z-index: 10;
      transition: opacity 0.3s;
    }

    .mic-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .status-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .status-item .label {
      font-weight: 600;
      color: var(--text-secondary);
      font-size: 13px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-item .val {
      font-family: var(--font-mono);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .level-bar-bg {
      height: 8px;
      background: var(--bg-hover);
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }
    
    .level-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-yellow), var(--accent-red));
      transition: width 0.1s;
    }
    
    .btn-custom-primary {
      background: var(--accent-blue);
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-custom-primary:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="app-layout">
    <main class="main-content">
      <div class="container pb-5">
        <a href="/" class="hero-cta" style="background:transparent; border:1px solid var(--border); color:var(--text-primary); padding:6px 12px; margin:24px 0; display:inline-block;">&larr; Back to all tools</a>

        <div class="mb-4 d-flex justify-content-between align-items-center" style="display:flex; justify-content:space-between; margin-bottom:24px;">
          <div>
            <h1 class="page-title"><i class="fa-solid fa-microphone text-accent"></i> Microphone Test</h1>
            <p class="page-subtitle">Check your microphone input level, view the live waveform, and test your noise floor.</p>
          </div>
          <div id="deviceInfo" style="font-family:var(--font-mono); color:var(--text-muted); font-size:14px;"></div>
        </div>

        <div class="visualizer-container">
          <div class="mic-overlay" id="micOverlay">
            <button class="btn-custom-primary btn-lg" onclick="startMic()">
              <i class="fa-solid fa-microphone-lines" style="margin-right:8px;"></i> Enable Microphone
            </button>
          </div>
          <canvas id="waveformCanvas"></canvas>
        </div>

        <div class="status-grid">
          <div class="status-item">
            <div class="label">Current Level</div>
            <div class="val" id="valLevel">- ∞ dB</div>
            <div class="level-bar-bg"><div class="level-bar-fill" id="barLevel"></div></div>
          </div>
          <div class="status-item">
            <div class="label">Peak Level</div>
            <div class="val" id="valPeak" style="color:var(--accent-green);">- ∞ dB</div>
          </div>
          <div class="status-item">
            <div class="label">Background Noise Floor</div>
            <div class="val" id="valNoise" style="color:var(--accent-yellow);">Measuring...</div>
            <div style="font-size:11px; color:var(--text-muted); margin-top:5px;">(Stay silent to measure)</div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="/shared/sidebar.js?v=9"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('mic-test');
    });

    let audioContext;
    let analyser;
    let microphone;
    let isRunning = false;

    const canvas = document.getElementById('waveformCanvas');
    const ctx = canvas.getContext('2d');
    
    function resizeCanvas() {
      canvas.width = canvas.parentElement.clientWidth;
      canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let peak = -100;
    let noiseFloor = 0;
    let noiseSamples = [];

    async function startMic() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        
        document.getElementById('micOverlay').classList.add('hidden');

        const track = stream.getAudioTracks()[0];
        document.getElementById('deviceInfo').innerText = track.label || 'Default Microphone';

        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        
        analyser.fftSize = 2048;
        microphone.connect(analyser);
        
        isRunning = true;
        drawWaveform();
        
      } catch (err) {
        console.error(err);
        alert('Microphone access denied. Please allow microphone permissions in your browser.');
      }
    }

    function getDBFS(rms) {
      if (rms === 0) return -100;
      return 20 * Math.log10(rms);
    }

    function drawWaveform() {
      if (!isRunning) return;
      requestAnimationFrame(drawWaveform);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteTimeDomainData(dataArray);

      // Light Mode Background
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.lineWidth = 2;
      ctx.strokeStyle = '#0070d1'; // Accent Blue
      ctx.beginPath();

      const sliceWidth = canvas.width * 1.0 / bufferLength;
      let x = 0;
      let sumSquares = 0;

      for (let i = 0; i < bufferLength; i++) {
        const v = dataArray[i] / 128.0;
        const y = v * canvas.height / 2;

        const normalized = (dataArray[i] - 128) / 128;
        sumSquares += normalized * normalized;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
        x += sliceWidth;
      }

      ctx.lineTo(canvas.width, canvas.height / 2);
      ctx.stroke();

      const rms = Math.sqrt(sumSquares / bufferLength);
      const dbfs = getDBFS(rms);
      
      let dbStr = dbfs <= -100 ? '- ∞' : dbfs.toFixed(1);
      document.getElementById('valLevel').innerText = `${dbStr} dB`;
      
      let pct = Math.max(0, Math.min(100, (dbfs + 60) * (100/60)));
      document.getElementById('barLevel').style.width = `${pct}%`;

      if (dbfs > peak && dbfs > -90) {
        peak = dbfs;
        document.getElementById('valPeak').innerText = `${peak.toFixed(1)} dB`;
      }

      if (dbfs > -95) {
        noiseSamples.push(dbfs);
        if (noiseSamples.length > 180) noiseSamples.shift();
        
        if (noiseSamples.length === 180) {
          const floor = Math.min(...noiseSamples);
          document.getElementById('valNoise').innerText = `${floor.toFixed(1)} dB`;
        }
      }
    }
  </script>
</body>
</html>
