<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speaker Test — Left and Right Channels | ay5uh</title>
  <meta name="description" content="Simple, fast online speaker test. Check your left and right speakers instantly.">
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png">
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-31VR9YJW06"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-31VR9YJW06');
  </script>

  <!-- Global CSS & Icons -->
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    .test-dashboard {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .btn-massive {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: 100%;
      background: var(--bg-base);
      color: var(--text-primary);
      border: 2px solid var(--border);
      padding: 24px;
      font-size: 20px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      margin-bottom: 24px;
      transition: all 0.2s;
    }
    
    .btn-massive i {
      font-size: 32px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .btn-massive:hover {
      border-color: var(--accent-blue);
      background: var(--bg-hover);
    }

    .btn-massive:active {
      transform: scale(0.98);
    }

    .btn-massive.playing {
      border-color: var(--accent-green);
      background: rgba(34, 197, 94, 0.1);
    }
    
    .btn-massive.playing i {
      color: var(--accent-green);
    }
  </style>
</head>
<body>

  <div class="app-layout">
    <main class="main-content">
      <div class="container">
        
        <a href="/" class="tool-back-link">&larr; Back to all tools</a>
        
        <div class="tool-header-inner">
          <h1>Simple Speaker Test</h1>
          <p>Quickly verify that both your left and right speakers are working.</p>
        </div>

        <div class="test-dashboard">
          <button class="btn-massive" id="btnLeft" onclick="playTest(-1, 'btnLeft')">
            <i class="fa-solid fa-volume-high"></i>
            Play Left Speaker
          </button>
          
          <button class="btn-massive" id="btnRight" onclick="playTest(1, 'btnRight')">
            <i class="fa-solid fa-volume-high"></i>
            Play Right Speaker
          </button>

          <button class="btn-massive" id="btnBoth" onclick="playTest(0, 'btnBoth')">
            <i class="fa-solid fa-volume-high"></i>
            Play Both Speakers
          </button>
        </div>

        <div class="about-tool-section">
          <h3>About this tool</h3>
          <p>This is a fast, no-nonsense stereo speaker test. It plays a 1kHz tone panned entirely to the left, entirely to the right, or perfectly centered. No installation required.</p>
        </div>

      </div>
    </main>
  </div>

  <script src="/shared/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      injectSidebar('speaker-test');
    });

    let audioCtx;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if(audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // UTILITY: PLAY TONE
    function playTest(panValue, btnId) {
      initAudio();
      
      const btn = document.getElementById(btnId);
      btn.classList.add('playing');
      
      // Disable all buttons to prevent overlap
      document.querySelectorAll('.btn-massive').forEach(b => b.disabled = true);

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const panner = audioCtx.createStereoPanner();
      
      const duration = 2.5; // play for 2.5 seconds
      
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime); // 1kHz test tone
      
      // Smooth envelope to prevent clicks
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.5, audioCtx.currentTime + duration - 0.1);
      gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration);
      
      panner.pan.value = panValue; // -1 = Left, 1 = Right, 0 = Center
      
      osc.connect(panner);
      panner.connect(gain);
      gain.connect(audioCtx.destination);
      
      osc.start();
      osc.stop(audioCtx.currentTime + duration);

      // Re-enable and reset UI when done
      setTimeout(() => {
        btn.classList.remove('playing');
        document.querySelectorAll('.btn-massive').forEach(b => b.disabled = false);
      }, duration * 1000);
    }
  </script>
</body>
</html>
